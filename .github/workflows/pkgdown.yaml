on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          # Pinned to 4.5: matches Bioconductor 3.21 (below) and has prebuilt
          # binaries for the Bioc graph deps. 'release' rolled to 4.6, which
          # needs a newer Bioconductor and broke this workflow.
          r-version: '4.5'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libharfbuzz-dev libfribidi-dev

      - name: Install BiocManager and set version
        run: |
          install.packages("BiocManager")
          BiocManager::install(version = "3.21", ask = FALSE)
        shell: Rscript {0}

      - name: Install dependencies
        run: |
          install.packages(c("remotes", "pkgdown"))
          # Hard deps only: the docs build needs no Suggests (vignettes only
          # library(MCView) with eval=FALSE chunks). This also avoids building
          # the archived qsbase/qs (Suggests), which no longer compiles against
          # the current stringfish.
          remotes::install_deps(dependencies = c("Depends", "Imports", "LinkingTo"))
          BiocManager::install(c("Rgraphviz", "graph"), ask = FALSE)
        shell: Rscript {0}

      - name: Install package
        run: R CMD INSTALL .

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub pages 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: docs